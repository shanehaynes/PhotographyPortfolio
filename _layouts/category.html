---
layout: default
---

<section class="gallery">
  {% for photo in site.data.photos[page.category] %}
    <div class="gallery-item">
      <img src="{{ site.baseurl }}/{{ photo.url }}" alt="{{ photo.alt }}" {% if forloop.first %}loading="eager" fetchpriority="high"{% else %}loading="lazy" fetchpriority="low"{% endif %} decoding="async" data-date="{{ photo.date }}" data-title="{{ photo.title }}" {% if photo.width and photo.height %}width="{{ photo.width }}" height="{{ photo.height }}"{% endif %}>
    </div>
  {% endfor %}
</section>
